examples_readme:
  readme_template: docs/example_readme.md
  skip_examples: []
  code_snippet_files:
    additional: []
  template_vars:
    production_considerations_comment: ""
    production_considerations: ""
    skip_if_name_contains: []
  versions_tf:
    add: |
      provider "mongodbatlas" {}
      provider "google" {
        project = var.gcp_project_id
        region  = var.gcp_region
      }
    skip_if_name_contains: []
    generate_when_missing_only: false
    force_generate: false

tables:
  - name: Examples
    intro: |
      The following examples show common configurations you can copy and adapt. Start with the [encryption](./examples/encryption) example for a minimal setup, then explore other examples for PrivateLink, backup export, and log integration. Examples can be combined in a single module call. See the [complete](./examples/complete) and [gcp_read_only](./examples/gcp_read_only) examples.
    columns: ["feature", "name", "description"]
    link_column: name
    example_rows:
      - folder_name: complete
        feature: All Features
        name: Encryption + Backup Export + PrivateLink + Log Integration
        description: Full v0.2.0 stack with module-managed KMS key, GCS buckets, PSC connectivity, and log export
      - folder_name: encryption
        feature: Encryption at Rest
        name: GCP Cloud KMS Integration (User-Provided)
        description: Encrypt Atlas data at rest using an existing Google Cloud KMS key version
      - folder_name: backup_export
        feature: Backup Export
        name: GCS Bucket Export (Module-Managed)
        description: Export Atlas backup snapshots to a module-managed GCS bucket
      - folder_name: log_integration
        feature: Log Integration
        name: GCS Log Export (Module-Managed)
        description: Export Atlas operational and audit logs to a module-managed GCS bucket
      - folder_name: privatelink
        feature: PrivateLink (PSC)
        name: Module-Managed Private Service Connect
        description: Module-managed PSC endpoints. See the PrivateLink topology guide for pattern-specific settings
      - folder_name: privatelink_byoe
        feature: PrivateLink (PSC)
        name: BYO Endpoint (Bring Your Own Endpoint)
        description: Apply-order workflow for externally managed GCP forwarding rules
      - folder_name: gcp_read_only
        feature: Read-Only GCP
        name: BYO CPA + Pre-Granted IAM
        description: Uses an existing CPA and skip_iam_bindings for environments where Terraform cannot create GCP IAM bindings
